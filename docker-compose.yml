version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./spark_jobs:/opt/airflow/spark_jobs
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    - postgres
  networks:
    - marketplace_net

services:

  # ZOOKEEPER
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - marketplace_net

  # KAFKA
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - marketplace_net

  # HDFS NAMENODE
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
    environment:
      CLUSTER_NAME: marketplace-cluster
    env_file:
      - ./docker/hadoop.env
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
    networks:
      - marketplace_net

  # HDFS DATANODE
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      - namenode
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./docker/hadoop.env
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
    networks:
      - marketplace_net

  # HIVE METASTORE DATABASE
  hive-metastore-db:
    image: postgres:14
    container_name: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    networks:
      - marketplace_net

  # HIVE METASTORE
  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    depends_on:
      - hive-metastore-db
      - namenode
    environment:
      SERVICE_PRECONDITION: "namenode:9870 hive-metastore-db:5432"
    env_file:
      - ./docker/hadoop.env
    command: /opt/hive/bin/hive --service metastore
    networks:
      - marketplace_net

  # HIVE SERVER
  hiveserver:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hiveserver
    depends_on:
      - hive-metastore
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_PRECONDITION: "hive-metastore:9083"
    env_file:
      - ./docker/hadoop.env
    networks:
      - marketplace_net

  # SPARK MASTER
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/data
    networks:
      - marketplace_net

  # SPARK WORKER
  spark-worker:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MASTER: spark://spark-master:7077
    networks:
      - marketplace_net

  # AIRFLOW DATABASE
  postgres:
    image: postgres:14
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres:/var/lib/postgresql/data
    networks:
      - marketplace_net

  # AIRFLOW WEBSERVER
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8081:8080"
    command: webserver

  # AIRFLOW SCHEDULER
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler

  # JUPYTER
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    networks:
      - marketplace_net

volumes:
  hdfs_namenode:
  hdfs_datanode:
  hive_metastore_db:
  airflow_postgres:
  airflow_logs:

networks:
  marketplace_net:
    driver: bridge